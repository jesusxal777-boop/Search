<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamByte Search</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="container">

        <h1 class="logo">
            DreamByte Search
        </h1>

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="Buscar en DreamByte Search..."
            >

            <button id="searchBtn">
                Buscar
            </button>

        </div>

        <div id="results"></div>

    </div>

    <script src="app.js"></script>

</body>
</html>
